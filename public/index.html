<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tallinna otselennud</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: #0f1117;
      color: #e8eaf0;
    }

    header {
      padding: 14px 20px;
      background: #1a1d27;
      border-bottom: 1px solid #2a2d3a;
      display: flex;
      align-items: baseline;
      gap: 12px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
    }

    #dest-count {
      font-size: 0.85rem;
      color: #7c83a0;
    }

    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar */
    #sidebar {
      width: 300px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: #13161f;
      border-right: 1px solid #2a2d3a;
      overflow: hidden;
    }

    #search-wrap {
      padding: 12px;
      border-bottom: 1px solid #2a2d3a;
      flex-shrink: 0;
    }

    #search {
      width: 100%;
      padding: 8px 12px;
      background: #1e2130;
      border: 1px solid #2a2d3a;
      border-radius: 6px;
      color: #e8eaf0;
      font-size: 0.875rem;
      outline: none;
    }

    #search::placeholder { color: #555a70; }
    #search:focus { border-color: #4a90d9; }

    #dest-list {
      overflow-y: auto;
      flex: 1;
      padding: 8px 0;
    }

    .country-group { margin-bottom: 4px; }

    .country-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #555a70;
      padding: 8px 16px 4px;
    }

    .dest-item {
      padding: 8px 16px;
      cursor: pointer;
      border-radius: 0;
      transition: background 0.1s;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .dest-item:hover { background: #1e2130; }
    .dest-item.active { background: #1e2d4a; }

    .dest-city {
      font-size: 0.9rem;
      font-weight: 500;
      color: #e8eaf0;
    }

    .dest-airlines {
      font-size: 0.75rem;
      color: #7c83a0;
    }

    /* Map */
    #map {
      flex: 1;
      z-index: 0;
    }

    /* Leaflet popup overrides */
    .leaflet-popup-content-wrapper {
      background: #1a1d27;
      color: #e8eaf0;
      border: 1px solid #2a2d3a;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .leaflet-popup-tip { background: #1a1d27; }
    .popup-city { font-size: 1rem; font-weight: 600; margin-bottom: 4px; }
    .popup-country { font-size: 0.8rem; color: #7c83a0; margin-bottom: 6px; }
    .popup-airlines { font-size: 0.8rem; margin-bottom: 6px; }
    .popup-dates-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #555a70;
      margin-bottom: 3px;
    }
    .popup-dates {
      font-size: 0.8rem;
      color: #a8c4e8;
      line-height: 1.5;
      max-height: 120px;
      overflow-y: auto;
    }
    .popup-iata {
      display: inline-block;
      background: #1e2d4a;
      color: #4a90d9;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-left: 6px;
    }

    /* Direction toggle buttons */
    #dir-toggle {
      display: flex;
      gap: 6px;
    }

    .dir-btn {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid #3a4060;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      background: transparent;
      color: #555a70;
    }

    .dir-btn.dep.active {
      background: rgba(74, 144, 217, 0.15);
      border-color: #4a90d9;
      color: #4a90d9;
    }

    .dir-btn.arr.active {
      background: rgba(232, 131, 42, 0.15);
      border-color: #e8832a;
      color: #e8832a;
    }

    /* Direction badges in sidebar */
    .dir-badge {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 700;
      border-radius: 3px;
      padding: 0 3px;
      margin-left: 3px;
      vertical-align: middle;
    }

    .dep-badge { color: #4a90d9; background: rgba(74, 144, 217, 0.15); }
    .arr-badge { color: #e8832a; background: rgba(232, 131, 42, 0.15); }

    /* Popup direction labels */
    .popup-dir-label {
      font-size: 0.8rem;
      margin: 5px 0 2px;
    }

    .dep-label { color: #4a90d9; }
    .arr-label { color: #e8832a; }

    /* Map legend (rendered as Leaflet control) */
    .map-legend {
      background: rgba(26, 29, 39, 0.92);
      border: 1px solid #2a2d3a;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 0.75rem;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      color: #a8c4e8;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.35);
      flex-shrink: 0;
    }

    /* Loading / error */
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #7c83a0;
      font-size: 0.9rem;
      z-index: 1000;
    }

    /* Tagline banner */
    .tagline-banner {
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
      padding: 10px 24px;
      background: linear-gradient(100deg, #0d1a2e 0%, #112240 40%, #0f1a30 100%);
      border-bottom: 1px solid #1e3050;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .tagline-banner::before {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        -55deg,
        transparent,
        transparent 18px,
        rgba(74, 144, 217, 0.03) 18px,
        rgba(74, 144, 217, 0.03) 19px
      );
      pointer-events: none;
    }

    .tagline-plane {
      font-size: 1.3rem;
      line-height: 1;
      flex-shrink: 0;
      filter: drop-shadow(0 0 6px rgba(74, 144, 217, 0.6));
    }

    .tagline-text {
      font-size: 0.85rem;
      font-style: italic;
      color: #7ca8d4;
      letter-spacing: 0.01em;
      line-height: 1.4;
    }

    .tagline-text em {
      font-style: normal;
      color: #a8c8e8;
      font-weight: 500;
    }

    .tagline-rule {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, rgba(74,144,217,0.25), transparent);
      flex-shrink: 1;
      min-width: 20px;
    }

    /* Date filter bar */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      background: #1e2d4a;
      border-bottom: 2px solid #4a90d9;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .filter-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #a8c4e8;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    .date-inputs {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .date-inputs input[type="date"] {
      padding: 6px 10px;
      background: #0f1826;
      border: 1px solid #4a90d9;
      border-radius: 6px;
      color: #e8eaf0;
      font-size: 0.875rem;
      font-family: inherit;
      outline: none;
      cursor: pointer;
    }

    .date-inputs input[type="date"]:focus {
      border-color: #7ab3f0;
      box-shadow: 0 0 0 2px rgba(74,144,217,0.25);
    }

    .date-arrow {
      color: #4a90d9;
      font-size: 1.1rem;
    }

    #reset-dates {
      padding: 5px 12px;
      background: transparent;
      border: 1px solid #3a5070;
      border-radius: 6px;
      color: #7c83a0;
      font-size: 0.8rem;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }

    #reset-dates:hover {
      border-color: #4a90d9;
      color: #a8c4e8;
    }

    /* Responsive: mobile */
    @media (max-width: 640px) {
      .main { flex-direction: column-reverse; }
      #sidebar { width: 100%; height: 45%; border-right: none; border-top: 1px solid #2a2d3a; }
      #map { height: 55%; }
      .filter-bar { padding: 8px 12px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Tallinna otselennud</h1>
    <div id="dir-toggle">
      <button id="toggle-dep" class="dir-btn dep active">↗ Tallinnast</button>
      <button id="toggle-arr" class="dir-btn arr active">↙ Tallinna</button>
    </div>
    <span id="dest-count">laadimine...</span>
  </header>
  <div class="tagline-banner">
    <span class="tagline-plane">✈</span>
    <span class="tagline-text">„Eestlased reisivad sinna, kuhu <em>otse lennata saab!</em>"</span>
    <span class="tagline-rule"></span>
  </div>
  <div class="filter-bar">
    <span class="filter-label">Kuva lennud</span>
    <div class="date-inputs">
      <input type="date" id="from-date" />
      <span class="date-arrow">→</span>
      <input type="date" id="to-date" />
    </div>
    <button id="reset-dates">Näita kõik</button>
  </div>
  <div class="main">
    <aside id="sidebar">
      <div id="search-wrap">
        <input id="search" type="search" placeholder="Otsi sihtkohta..." autocomplete="off" />
      </div>
      <div id="dest-list"></div>
    </aside>
    <div id="map"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js" type="module"></script>
</body>
</html>
